name: Weekly Refresh (Mon/Wed/Fri 10:00 CST)

on:
  schedule:
    # 02:00 UTC = 10:00 CST (UTC+8)
    - cron: '0 2 * * 1,3,5'
  workflow_dispatch:  # allow manual trigger

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update last-refreshed timestamp
        run: |
          DATE=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M CST')
          # Update the "最后更新" date in index.html
          sed -i "s/最后更新 [0-9-]*/最后更新 $(TZ='Asia/Shanghai' date '+%Y-%m-%d')/" index.html
          echo "Refreshed at: $DATE"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          # Only commit if there are changes
          git diff --staged --quiet || git commit -m "chore: weekly refresh $(TZ='Asia/Shanghai' date '+%Y-%m-%d')"
          git push
